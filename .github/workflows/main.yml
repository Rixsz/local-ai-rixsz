name: Multimodal AI CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test-cross-platform:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        
    - name: Install PyInstaller
      run: pip install pyinstaller
        
    - name: Run Project Build (Package Binary)
      run: python build.py

    - name: Upload Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: LocalAI-Build-${{ matrix.os }}
        path: dist/
